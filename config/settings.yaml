# 实时入场监控
realtime:
  enabled: false                    # 默认关闭，向后兼容
  poll_interval_seconds: 10         # 轮询间隔
  price_tolerance_pct: 0.1          # 价格容忍度（entry_range 外 0.1% 也算进入）
  require_indicator_confirm: true   # 是否需要 5m 指标确认
  max_wait_minutes: 120             # 单信号最长等待时间（超过则放弃）
