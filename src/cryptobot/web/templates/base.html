<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}CryptoBot Dashboard{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@2.0.4"></script>
    <script src="https://unpkg.com/lightweight-charts@4/dist/lightweight-charts.standalone.production.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
               background: #0d1117; color: #c9d1d9; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        h1 { color: #58a6ff; margin-bottom: 20px; }
        h2 { color: #8b949e; font-size: 14px; text-transform: uppercase;
             margin-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
                gap: 16px; }
        .card { background: #161b22; border: 1px solid #30363d; border-radius: 8px;
                padding: 16px; }
        .card table { width: 100%; border-collapse: collapse; }
        .card th, .card td { text-align: left; padding: 6px 8px; border-bottom: 1px solid #21262d; }
        .card th { color: #8b949e; font-weight: 500; font-size: 12px; }
        .green { color: #3fb950; } .red { color: #f85149; }
        .yellow { color: #d29922; } .blue { color: #58a6ff; }
        .badge { display: inline-block; padding: 2px 8px; border-radius: 12px;
                 font-size: 12px; }
        .badge-critical { background: #f8514922; color: #f85149; }
        .badge-warning { background: #d2992222; color: #d29922; }
        .stat { font-size: 24px; font-weight: 600; }
        .stat-label { font-size: 12px; color: #8b949e; }
        .stats-row { display: flex; gap: 24px; margin-bottom: 16px; flex-wrap: wrap; }
        .stat-box { flex: 1; min-width: 120px; }
        #loading { color: #8b949e; font-style: italic; }
    </style>
</head>
<body>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
</body>
</html>
